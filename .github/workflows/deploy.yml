name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        run: docker build ./backend -t system-health-backend

      - name: Build frontend image
        run: docker build ./frontend -t system-health-frontend